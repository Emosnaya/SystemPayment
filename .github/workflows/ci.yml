name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test-python:
    name: Python - Linter & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd payment-service-python
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8 (PEP8 check)
        run: |
          cd payment-service-python
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest
        run: |
          cd payment-service-python
          pytest

  lint-build-test-node:
    name: Node.js - Linter, Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-node/package-lock.json

      - name: Install dependencies
        run: |
          cd api-node
          npm ci

      - name: Run Linter (ESLint)
        run: |
          cd api-node
          # Ejecuta linter si existe el script en package.json
          npm run lint --if-present

      - name: Build Check (TypeScript Compilation)
        run: |
          cd api-node
          npm run build

      - name: Run Jest Tests
        run: |
          cd api-node
          npm test